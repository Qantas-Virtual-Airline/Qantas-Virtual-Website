<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#8B0018"/>
    </linearGradient>
  </defs>
  <!-- Kangaroo silhouette slash mark -->
  <polygon points="0,0 36,0 36,60 24,80 0,80" fill="url(#rg)"/>
  <!-- Q letter -->
  <text x="6" y="52" font-family="'Bebas Neue',sans-serif" font-size="56" fill="white" letter-spacing="1">Q</text>
  <!-- Tail slash accent -->
  <polygon points="30,55 36,45 36,60 24,80 18,80" fill="rgba(0,0,0,0.25)"/>
  <!-- QANTAS VIRTUAL text -->
  <text x="44" y="36" font-family="'Bebas Neue',sans-serif" font-size="26" fill="#FFFFFF" letter-spacing="3">QANTAS</text>
  <text x="44" y="60" font-family="'Bebas Neue',sans-serif" font-size="26" fill="#C8102E" letter-spacing="3">VIRTUAL</text>
  <!-- QFV label -->
  <rect x="44" y="64" width="40" height="12" fill="#C8102E"/>
  <text x="46" y="73" font-family="'Share Tech Mono',monospace" font-size="8" fill="white" letter-spacing="2">ICAO: QFV</text>
</svg>
